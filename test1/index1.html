<!DOCTYPE html>
<html>
<head>
    <title>Current Date & Time</title>
    <style>
        body {
            text-align: center;
            background-color: #1a1a2e;
            color: #e0e0e0;
            font-family: Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }
        #clock {
            font-size: 3.5em;
            font-weight: 900;
            color: #00d4ff;
            letter-spacing: 4px;
        }
        #date {
            font-size: 1.5em;
            margin-top: 10px;
            color: #aaaaaa;
        }
    </style>
</head>
<body>
    <h1>Current Date &amp; Time</h1>
    <div id="clock"></div>
    <div id="date"></div>

    <script>
        function updateTime() {
            var now = new Date();
            document.getElementById("clock").innerHTML = now.toLocaleTimeString();
            document.getElementById("date").innerHTML = now.toLocaleDateString(undefined, {
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
            });
        }
        updateTime();
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
