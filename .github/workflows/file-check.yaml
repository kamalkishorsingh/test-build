name: Label PR if File is Missing

on:
  pull_request:
    branches:
      - test1

jobs:
  label-if-missing:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: 🔁 Checkout Code
        uses: actions/checkout@v3

      - name: 🕵️ Check for Required File
        id: check_file
        run: |
          FILE_TO_CHECK="test4/test4.sh"

          echo "Looking for $FILE_TO_CHECK..."

          if [ ! -f "$FILE_TO_CHECK" ]; then
            echo "::warning::File not found: $FILE_TO_CHECK"
            echo "missing_file=true" >> $GITHUB_OUTPUT
          else
            echo "::notice::✅ File exists: $FILE_TO_CHECK"
            echo "missing_file=false" >> $GITHUB_OUTPUT
          fi

      - name: 🏷️ Add Label to PR
        if: steps.check_file.outputs.missing_file == 'true'
        uses: actions-ecosystem/action-add-labels@v1
        with:
          github_token: ${{ secrets.TOKEN }}
          labels: missing-required-file

      - name: 📋 Summary
        run: |
          echo "### File Check Result" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check_file.outputs.missing_file }}" == "true" ]; then
            echo "- ❌ **web/target/site/jacoco/index.html** is missing" >> $GITHUB_STEP_SUMMARY
            echo "- 🏷️ Added label: `missing-required-file`" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ✅ File is present." >> $GITHUB_STEP_SUMMARY
