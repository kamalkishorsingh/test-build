name: Check and Label PR if Required File is Missing

on:
  pull_request:
    branches:
      - test2

jobs:
  check-required-file:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: 🔁 Checkout Code
        uses: actions/checkout@v3

      - name: 🕵️ Check for Required File
        id: check_file
        run: |
          FILE_TO_CHECK="test4/test4-test.sh"
          echo "Checking for $FILE_TO_CHECK..."
          if [ ! -f "$FILE_TO_CHECK" ]; then
            echo "missing_file=true" >> $GITHUB_OUTPUT
            echo "::warning::File not found: $FILE_TO_CHECK"
          else
            echo "missing_file=false" >> $GITHUB_OUTPUT
            echo "::notice::✅ File exists: $FILE_TO_CHECK"
          fi

      - name: 🏷️ Add Label if File is Missing
        if: steps.check_file.outputs.missing_file == 'true'
        uses: actions-ecosystem/action-add-labels@v1
        with:
          github_token: ${{ secrets.TOKEN }}
          labels: missing-required-file

      - name: ❌ Remove Label if File Exists
        if: steps.check_file.outputs.missing_file == 'false'
        uses: actions-ecosystem/action-remove-labels@v1
        with:
          github_token: ${{ secrets.TOKEN }}
          labels: missing-required-file

      - name: 📋 Fail if File Missing
        if: steps.check_file.outputs.missing_file == 'true'
        run: |
          echo "❌ Required file is missing. Failing the job."
          exit 1

      - name: ✅ Success Summary
        if: steps.check_file.outputs.missing_file == 'false'
        run: |
          echo "✅ Required file is present."
